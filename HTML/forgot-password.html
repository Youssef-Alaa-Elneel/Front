<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabta - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
        }
    </script>
</head>
<body class="min-h-screen bg-[#FAFAFA] dark:bg-[#171717] text-[#171717] dark:text-[#F5F5F5] transition-colors duration-300">
    
    <header class="w-full py-4 px-6 shadow-sm bg-[#FFFFFF] dark:bg-[#262626] transition-colors duration-300">
        <div class="flex items-center justify-between">
            <a href="login.html" class="hover:opacity-80 transition-opacity text-[#7C3AED] dark:text-[#8B5CF6]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </a>
            <h1 class="text-xl font-bold tracking-tight">Forgot Password</h1>
            <div class="w-6"></div>
        </div>
    </header>

    <main class="flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-[#FFFFFF] dark:bg-[#262626] rounded-2xl shadow-lg p-8 border border-gray-100 dark:border-gray-800 transition-colors duration-300">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl flex items-center justify-center bg-[#7C3AED]/10 dark:bg-[#8B5CF6]/10 text-[#7C3AED] dark:text-[#8B5CF6]">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">Reset Password</h2>
                    <p class="text-gray-500 dark:text-gray-400">Enter your email and we'll send you a reset link</p>
                </div>

                <form class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-medium mb-2">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your registered email"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all">
                    </div>

                    <div class="rounded-lg p-4 bg-[#7C3AED]/5 dark:bg-[#8B5CF6]/5 border border-[#7C3AED]/20 dark:border-[#8B5CF6]/20">
                        <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">
                            We'll send a password reset link to your email. Please check your inbox and spam folder.
                        </p>
                    </div>

                    <button type="submit" class="w-full py-3 px-4 rounded-lg font-bold text-white bg-[#7C3AED] dark:bg-[#8B5CF6] hover:opacity-90 shadow-md transition-all">
                        Send Reset Link
                    </button>
                </form>

                <div class="mt-6 text-center space-y-3">
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        Remember your password? 
                        <a href="login.html" class="font-bold text-[#7C3AED] dark:text-[#8B5CF6] hover:underline">Log In</a>
                    </p>
                    <p class="text-xs text-gray-400">
                        Need help? <a href="#" class="underline hover:text-[#7C3AED]">Contact Support</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
