<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabta - Create Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        light: {
                            bg: '#FAFAFA',
                            card: '#FFFFFF',
                            primary: '#7C3AED',
                            text: '#171717'
                        },
                        dark: {
                            bg: '#171717',
                            card: '#262626',
                            primary: '#8B5CF6',
                            text: '#F5F5F5'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text transition-colors duration-300 min-h-screen pb-10">

    <header class="bg-light-card dark:bg-dark-card border-b border-gray-200 dark:border-white/10 sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center gap-4">
            <button
                class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/5 transition-colors flex items-center justify-center">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold">Create New Group</h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        <div
            class="bg-light-card dark:bg-dark-card rounded-2xl shadow-sm border border-gray-200 dark:border-white/10 overflow-hidden">

            <div
                class="relative h-40 bg-gray-200 dark:bg-white/5 flex items-center justify-center group cursor-pointer transition-colors hover:bg-gray-300 dark:hover:bg-white/10">
                <div class="flex flex-col items-center text-gray-500 dark:text-gray-400">
                    <span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
                    <span class="text-sm font-semibold">Add Cover Photo</span>
                </div>

                <div
                    class="absolute -bottom-10 left-6 w-24 h-24 rounded-full bg-light-card dark:bg-dark-card border-4 border-light-card dark:border-dark-card flex items-center justify-center shadow-md overflow-hidden group/avatar hover:opacity-90">
                    <div
                        class="w-full h-full bg-gray-100 dark:bg-[#1f1f1f] flex items-center justify-center text-gray-400">
                        <span class="material-symbols-outlined text-2xl">camera_alt</span>
                    </div>
                </div>
            </div>

            <form class="p-6 pt-14 space-y-6">

                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="block text-sm font-semibold">Group Name <span
                                class="text-red-500">*</span></label>
                        <span class="text-xs text-gray-400">0 / 50</span>
                    </div>
                    <input type="text" maxlength="50" placeholder="e.g., Front-End React 2026"
                        class="w-full bg-light-bg dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-light-primary dark:focus:border-dark-primary transition-colors">
                </div>

                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="block text-sm font-semibold">Description</label>
                        <span class="text-xs text-gray-400">0 / 200</span>
                    </div>
                    <textarea rows="3" maxlength="200"
                        placeholder="Write a description explaining the goals of the group..."
                        class="w-full bg-light-bg dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-light-primary dark:focus:border-dark-primary transition-colors resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Technical Specialization <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <select
                            class="w-full bg-light-bg dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 appearance-none focus:outline-none focus:border-light-primary dark:focus:border-dark-primary transition-colors cursor-pointer">
                            <option value="" disabled selected>Select specialization...</option>
                            <option value="frontend">Front-End Development</option>
                            <option value="backend">Back-End Development</option>
                            <option value="mobile">Mobile Applications</option>
                            <option value="uiux">UI/UX Design</option>
                            <option value="data">Data Science</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-4 top-3.5 text-gray-400 pointer-events-none">expand_more</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Keywords & Skills</label>
                    <div
                        class="w-full bg-light-bg dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-xl p-2 flex flex-wrap gap-2 focus-within:border-light-primary dark:focus-within:border-dark-primary transition-colors">
                        <span
                            class="flex items-center gap-1 bg-light-primary/10 text-light-primary dark:bg-dark-primary/20 dark:text-dark-primary px-3 py-1.5 rounded-lg text-sm font-medium">
                            React.js
                            <button type="button" class="hover:text-red-500 flex items-center"><span
                                    class="material-symbols-outlined text-[16px]">close</span></button>
                        </span>
                        <span
                            class="flex items-center gap-1 bg-light-primary/10 text-light-primary dark:bg-dark-primary/20 dark:text-dark-primary px-3 py-1.5 rounded-lg text-sm font-medium">
                            Tailwind CSS
                            <button type="button" class="hover:text-red-500 flex items-center"><span
                                    class="material-symbols-outlined text-[16px]">close</span></button>
                        </span>
                        <input type="text" placeholder="Type a skill and press Enter..."
                            class="flex-1 bg-transparent min-w-[200px] px-2 py-1.5 focus:outline-none text-sm">
                    </div>
                    <p class="text-xs text-gray-500 mt-2">Add relevant skills to help others find your group easily.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold mb-3">Discussion Type</label>
                        <div
                            class="space-y-3 bg-light-bg dark:bg-[#1f1f1f] p-4 rounded-xl border border-gray-100 dark:border-white/5">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="radio" name="group_type" checked
                                    class="w-4 h-4 text-light-primary bg-gray-100 border-gray-300 focus:ring-light-primary dark:focus:ring-dark-primary dark:ring-offset-gray-800 dark:bg-gray-700 dark:border-gray-600">
                                <span class="text-sm">Project-based</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="radio" name="group_type"
                                    class="w-4 h-4 text-light-primary bg-gray-100 border-gray-300 focus:ring-light-primary dark:focus:ring-dark-primary dark:ring-offset-gray-800 dark:bg-gray-700 dark:border-gray-600">
                                <span class="text-sm">Learning-based</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-3">Privacy</label>
                        <div
                            class="space-y-3 bg-light-bg dark:bg-[#1f1f1f] p-4 rounded-xl border border-gray-100 dark:border-white/5">
                            <label class="flex items-start gap-3 cursor-pointer">
                                <input type="radio" name="privacy" checked
                                    class="w-4 h-4 mt-0.5 text-light-primary bg-gray-100 border-gray-300 focus:ring-light-primary dark:focus:ring-dark-primary dark:ring-offset-gray-800 dark:bg-gray-700 dark:border-gray-600">
                                <div>
                                    <span class="text-sm font-medium block">Public</span>
                                    <span class="text-xs text-gray-500">Anyone on the platform can join</span>
                                </div>
                            </label>
                            <label class="flex items-start gap-3 cursor-pointer">
                                <input type="radio" name="privacy"
                                    class="w-4 h-4 mt-0.5 text-light-primary bg-gray-100 border-gray-300 focus:ring-light-primary dark:focus:ring-dark-primary dark:ring-offset-gray-800 dark:bg-gray-700 dark:border-gray-600">
                                <div>
                                    <span class="text-sm font-medium block">Private</span>
                                    <span class="text-xs text-gray-500">Requires approval to join</span>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Quick Invite Connections (Optional)</label>
                    <div class="border border-gray-200 dark:border-white/10 rounded-xl overflow-hidden">
                        <div
                            class="bg-light-bg dark:bg-[#1f1f1f] p-3 border-b border-gray-200 dark:border-white/10 flex items-center gap-2">
                            <span class="material-symbols-outlined text-gray-400">search</span>
                            <input type="text" placeholder="Search connections to invite..."
                                class="w-full bg-transparent focus:outline-none text-sm">
                        </div>
                        <div class="max-h-40 overflow-y-auto p-2 space-y-1">
                            <label
                                class="flex items-center justify-between p-2 hover:bg-light-bg dark:hover:bg-white/5 rounded-lg cursor-pointer transition-colors">
                                <div class="flex items-center gap-3">
                                    <div
                                        class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm">
                                        A</div>
                                    <div>
                                        <p class="text-sm font-semibold">Ahmed Ali</p>
                                        <p class="text-xs text-gray-500">Front-End Developer</p>
                                    </div>
                                </div>
                                <input type="checkbox"
                                    class="w-4 h-4 text-light-primary rounded border-gray-300 focus:ring-light-primary dark:focus:ring-dark-primary dark:ring-offset-gray-800 dark:bg-gray-700 dark:border-gray-600">
                            </label>
                            <label
                                class="flex items-center justify-between p-2 hover:bg-light-bg dark:hover:bg-white/5 rounded-lg cursor-pointer transition-colors">
                                <div class="flex items-center gap-3">
                                    <div
                                        class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center font-bold text-sm">
                                        M</div>
                                    <div>
                                        <p class="text-sm font-semibold">Mona Hassan</p>
                                        <p class="text-xs text-gray-500">UI/UX Designer</p>
                                    </div>
                                </div>
                                <input type="checkbox"
                                    class="w-4 h-4 text-light-primary rounded border-gray-300 focus:ring-light-primary dark:focus:ring-dark-primary dark:ring-offset-gray-800 dark:bg-gray-700 dark:border-gray-600">
                            </label>
                        </div>
                    </div>
                </div>

                <hr class="border-gray-200 dark:border-white/10 my-6">

                <div class="flex items-center justify-end gap-4">
                    <button type="button"
                        class="px-6 py-2.5 rounded-xl text-sm font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors">
                        Cancel
                    </button>
                    <button type="button"
                        class="px-8 py-2.5 rounded-xl text-sm font-semibold text-white bg-light-primary hover:bg-purple-700 dark:bg-dark-primary dark:hover:bg-purple-500 transition-colors shadow-lg shadow-light-primary/30 dark:shadow-none">
                        Create Group
                    </button>
                </div>
            </form>
        </div>
    </main>

</body>

</html>
