<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabta - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
        }
    </script>
</head>
<body class="min-h-screen bg-[#FAFAFA] dark:bg-[#171717] text-[#171717] dark:text-[#F5F5F5] transition-colors duration-300">
    
    <header class="w-full py-4 px-6 shadow-sm bg-[#FFFFFF] dark:bg-[#262626] transition-colors duration-300">
        <div class="flex items-center justify-between">
            <a href="auth.html" class="hover:opacity-80 transition-opacity">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </a>
            <h1 class="text-xl font-semibold ">Sign Up</h1>
            <div class="w-6"></div>
        </div>
    </header>

    <main class="flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">
            
            <div class="bg-[#FFFFFF] dark:bg-[#262626] rounded-2xl shadow-lg p-8 transition-colors duration-300">
                
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold mb-2">Create Account</h2>
                    <p class="text-gray-500 dark:text-gray-400">Fill in your details to get started</p>
                </div>

                <form class="space-y-4">
                    
                    <div>
                        <label for="fullname" class="block text-sm font-medium mb-2">Full Name</label>
                        <input 
                            type="text" 
                            id="fullname" 
                            name="fullname"
                            placeholder="Enter your full name"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all placeholder-gray-400 dark:placeholder-gray-500"
                        >
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium mb-2">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            placeholder="Enter your email address"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all placeholder-gray-400 dark:placeholder-gray-500"
                        >
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-medium mb-2">Phone Number</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone"
                            placeholder="Enter your phone number"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all placeholder-gray-400 dark:placeholder-gray-500"
                        >
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium mb-2">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Create a strong password"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all placeholder-gray-400 dark:placeholder-gray-500"
                        >
                    </div>

                    <div>
                        <label for="confirm-password" class="block text-sm font-medium mb-2">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirm-password" 
                            name="confirm-password"
                            placeholder="Re-enter your password"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all placeholder-gray-400 dark:placeholder-gray-500"
                        >
                    </div>

                    <button 
                        type="submit"
                        class="w-full mt-2 py-3 px-4 rounded-lg font-medium transition-opacity hover:opacity-90 bg-[#7C3AED] dark:bg-[#8B5CF6] text-white dark:text-[#F5F5F5]"
                    >
                        Sign Up
                    </button>

                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        Already have an account? 
                        <a href="login.html" class="font-medium text-[#7C3AED] dark:text-[#8B5CF6] hover:underline transition-opacity">Log In</a>
                    </p>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
