<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"><title>Rabta | Tech Community Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#7C3AED', dark: '#8B5CF6' },
                        surface: { light: '#FFFFFF', dark: '#262626' },
                        background: { light: '#FAFAFA', dark: '#171717' },
                        textPrimary: { light: '#171717', dark: '#F5F5F5' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 10px; }
        .transition-theme { transition: background-color 0.2s ease, color 0.2s ease; }
    </style>
</head>
<body class="h-screen flex overflow-hidden bg-background-light dark:bg-background-dark text-textPrimary-light dark:text-textPrimary-dark transition-theme">

    <aside class="w-16 h-screen flex flex-col items-center py-6 bg-white dark:bg-[#171717] border-r border-gray-100 dark:border-white/5 shrink-0 transition-colors duration-300 z-20 overflow-y-auto no-scrollbar">
    
    <div class="mb-8">
        <div class="w-11 h-11 bg-purple-100 dark:bg-purple-900/30 rounded-2xl flex items-center justify-center text-purple-600 dark:text-purple-400 cursor-pointer hover:scale-105 transition-transform">
            <span class="material-icons-round text-[26px]">hub</span>
        </div>
    </div>

    <nav class="flex flex-col items-center gap-5 w-full">
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Chats">
                <span class="material-icons-round text-[24px]">chat_bubble</span>
            </button>
            <button class="w-11 h-11 bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-purple-600 dark:text-purple-400 rounded-2xl transition-all" title="Communities">
                <span class="material-icons-round text-[26px]">groups</span>
            </button>
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Saved">
                <span class="material-icons-round text-[24px]">bookmarks</span>
            </button>
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Jobs">
                <span class="material-icons-round text-[24px]">work_outline</span>
            </button>
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Calls">
            <span class="material-icons-round text-[24px]">call</span>
            </button>
        </nav>

    <div class="flex flex-col items-center gap-6 mt-auto pb-4">
        
        <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Settings">
            <span class="material-icons-round text-[24px]">settings</span>
        </button>

        <div class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center text-white text-[12px] font-bold ring-2 ring-purple-200 dark:ring-purple-900 ring-offset-2 ring-offset-white dark:ring-offset-[#171717] cursor-pointer hover:ring-purple-400 transition-all">
            YO
        </div>
        
    </div>
</aside>

    <main class="flex-1 flex flex-col relative bg-background-light dark:bg-background-dark">
    <div class="p-8 max-w-4xl mx-auto w-full">
        <div class="relative mb-8">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            <input type="text" placeholder="Search users, groups, jobs..." 
                   class="w-full py-4 pl-12 pr-4 bg-surface-light dark:bg-surface-dark rounded-full border border-gray-200 dark:border-white/10 outline-none focus:border-brand-light shadow-sm">
        </div>

        <div class="flex gap-4 mb-8">
            <button class="px-6 py-2 bg-brand-light dark:bg-brand-dark text-white rounded-full font-bold">Users</button>
            <button class="px-6 py-2 bg-gray-100 dark:bg-white/5 text-gray-500 dark:text-white/40 rounded-full hover:bg-gray-200">Groups</button>
            <button class="px-6 py-2 bg-gray-100 dark:bg-white/5 text-gray-500 dark:text-white/40 rounded-full hover:bg-gray-200">Jobs</button>
        </div>

        <h3 class="font-bold text-gray-400 uppercase text-xs tracking-widest mb-4">Recommended for you</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-surface-light dark:bg-surface-dark p-4 rounded-2xl border border-brand-light/10 flex items-center gap-4 hover:shadow-md cursor-pointer transition-all">
                <div class="w-12 h-12 rounded-full bg-brand-light flex items-center justify-center text-white font-bold">MC</div>
                <div>
                    <h4 class="font-bold">Marcus Riley</h4>
                    <p class="text-xs text-gray-500">UI/UX Designer • ITI Giza</p>
                </div>
            </div>
        </div>
    </div>
    <button onclick="toggleAI()" class="w-12 h-12 bg-[#7C3AED] dark:bg-[#8B5CF6] rounded-full flex items-center justify-center text-white dark:text-[#F5F5F5] shadow-xl hover:scale-110 transition-transform">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
    </button>
</div>
    </main>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
        function toggleAI() {
            document.getElementById('ai-popup').classList.toggle('hidden');
        }
    </script>
