<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabta - Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
        }
    </script>
</head>
<body class="min-h-screen bg-[#FAFAFA] dark:bg-[#171717] text-[#171717] dark:text-[#F5F5F5] transition-colors duration-300">
    
    <header class="w-full py-4 px-6 shadow-sm bg-[#FFFFFF] dark:bg-[#262626] transition-colors duration-300">
        <div class="flex items-center justify-between">
            <a href="auth.html" class="hover:opacity-80 transition-opacity text-[#7C3AED] dark:text-[#8B5CF6]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </a>
            <h1 class="text-xl font-bold tracking-tight">Log In</h1>
            <div class="w-6"></div>
        </div>
    </header>

    <main class="flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-[#FFFFFF] dark:bg-[#262626] rounded-2xl shadow-lg p-8 border border-gray-100 dark:border-gray-800 transition-colors duration-300">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold mb-2">Welcome Back</h2>
                    <p class="text-gray-500 dark:text-gray-400">Enter your credentials to continue</p>
                </div>

                <form class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-medium mb-2">Email or Phone</label>
                        <input type="text" id="email" placeholder="Enter your email or phone"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all placeholder-gray-400">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" placeholder="Enter your password"
                            class="w-full px-4 py-3 bg-transparent border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[#7C3AED] dark:focus:border-[#8B5CF6] focus:ring-1 focus:ring-[#7C3AED] dark:focus:ring-[#8B5CF6] transition-all placeholder-gray-400">
                    </div>

                    <div class="text-right">
                        <a href="forgot-password.html" class="text-sm font-medium text-[#7C3AED] dark:text-[#8B5CF6] hover:underline">
                            Forgot Password?
                        </a>
                    </div>

                    <button type="submit" class="w-full py-3 px-4 rounded-lg font-bold text-white bg-[#7C3AED] dark:bg-[#8B5CF6] hover:opacity-90 shadow-md transition-all">
                        Log In
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        Don't have an account? 
                        <a href="signup.html" class="font-bold text-[#7C3AED] dark:text-[#8B5CF6] hover:underline">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
