    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#7C3AED', dark: '#8B5CF6' },
                        surface: { light: '#FFFFFF', dark: '#262626' },
                        background: { light: '#FAFAFA', dark: '#171717' },
                        textPrimary: { light: '#171717', dark: '#F5F5F5' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 10px; }
        .transition-theme { transition: background-color 0.2s ease, color 0.2s ease; }
    </style>
</head>

        </div>
    </div>

   <nav class="flex flex-col items-center gap-5 w-full">
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Chats">
                <span class="material-icons-round text-[24px]">chat_bubble</span>
            </button>
            <button class="w-11 h-11 bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-purple-600 dark:text-purple-400 rounded-2xl transition-all" title="Communities">
                <span class="material-icons-round text-[26px]">groups</span>
            </button>
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Saved">
                <span class="material-icons-round text-[24px]">bookmarks</span>
            </button>
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Jobs">
                <span class="material-icons-round text-[24px]">work_outline</span>
            </button>
            <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Calls">
            <span class="material-icons-round text-[24px]">call</span>
            </button>
        </nav>

    <div class="flex flex-col items-center gap-6 mt-auto pb-4">
        
        <button class="w-11 h-11 flex items-center justify-center text-gray-400 hover:text-purple-600 hover:bg-purple-50 dark:hover:bg-purple-900/10 rounded-2xl transition-all" title="Settings">
            <span class="material-icons-round text-[24px]">settings</span>
        </button>

        <div class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center text-white text-[12px] font-bold ring-2 ring-purple-200 dark:ring-purple-900 ring-offset-2 ring-offset-white dark:ring-offset-[#171717] cursor-pointer hover:ring-purple-400 transition-all">
            YO
        </div>
        
    </div>
</aside>

  <main class="flex-1 flex flex-col relative bg-background-light dark:bg-[#171717] overflow-y-auto custom-scrollbar transition-theme">
    <div class="max-w-2xl mx-auto w-full p-6 md:p-8">
        
        <div class="flex items-center gap-4 mb-8">
            <button class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/5 transition-colors text-gray-500 dark:text-white/70">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </button>
            <h1 class="text-2xl font-bold text-[#171717] dark:text-[#F5F5F5]">Privacy</h1>
        </div>

        <div class="bg-surface-light dark:bg-[#262626] rounded-2xl border border-gray-100 dark:border-white/5 overflow-hidden">
            <div class="p-4 border-b border-gray-50 dark:border-white/5 opacity-60 text-xs font-bold tracking-widest uppercase text-gray-500 dark:text-white/60">Profile Visibility</div>
            
            <div class="flex items-center justify-between p-5 border-b border-gray-50 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-white/[0.02] transition-colors">
                <div class="flex-1 pr-4">
                    <h4 class="text-sm font-semibold text-[#171717] dark:text-[#F5F5F5]">Show Online Status</h4>
                    <p class="text-xs text-gray-500 dark:text-white/40 mt-1">Let connections see when you are active on Rabta.</p>
                </div>
                <div onclick="this.classList.toggle('bg-gray-300'); this.classList.toggle('dark:bg-gray-600'); this.classList.toggle('bg-brand-light'); this.classList.toggle('dark:bg-brand-dark'); this.firstElementChild.classList.toggle('translate-x-5');" 
                     class="w-12 h-7 bg-brand-light dark:bg-brand-dark rounded-full relative transition-colors cursor-pointer shrink-0">
                    <div class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full transition-transform translate-x-5 shadow-sm"></div>
                </div>
            </div>

            <div class="flex items-center justify-between p-5 border-b border-gray-50 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-white/[0.02] transition-colors">
                <div class="flex-1 pr-4">
                    <h4 class="text-sm font-semibold text-[#171717] dark:text-[#F5F5F5]">Public ITI Profile</h4>
                    <p class="text-xs text-gray-500 dark:text-white/40 mt-1">Allow recruiters to see your ITI track and graduation year.</p>
                </div>
                <div onclick="this.classList.toggle('bg-gray-300'); this.classList.toggle('dark:bg-gray-600'); this.classList.toggle('bg-brand-light'); this.classList.toggle('dark:bg-brand-dark'); this.firstElementChild.classList.toggle('translate-x-5');" 
                     class="w-12 h-7 bg-brand-light dark:bg-brand-dark rounded-full relative transition-colors cursor-pointer shrink-0">
                    <div class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full transition-transform translate-x-5 shadow-sm"></div>
                </div>
            </div>

            <div class="flex items-center justify-between p-5 hover:bg-gray-50 dark:hover:bg-white/[0.02] transition-colors">
                <div class="flex-1 pr-4">
                    <h4 class="text-sm font-semibold text-[#171717] dark:text-[#F5F5F5]">Allow Direct Messages</h4>
                    <p class="text-xs text-gray-500 dark:text-white/40 mt-1">Receive messages from people outside your communities.</p>
                </div>
                <div onclick="this.classList.toggle('bg-gray-300'); this.classList.toggle('dark:bg-gray-600'); this.classList.toggle('bg-brand-light'); this.classList.toggle('dark:bg-brand-dark'); this.firstElementChild.classList.toggle('translate-x-5');" 
                     class="w-12 h-7 bg-gray-300 dark:bg-gray-600 rounded-full relative transition-colors cursor-pointer shrink-0">
                    <div class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full transition-transform shadow-sm"></div>
                </div>
            </div>
        </div>

    </div>
</main>
    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
        function toggleAI() {
            document.getElementById('ai-popup').classList.toggle('hidden');
        }
    </script>
