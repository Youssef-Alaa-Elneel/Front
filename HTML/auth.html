<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabta - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
        }
    </script>
</head>
<body class="min-h-screen bg-[#FAFAFA] dark:bg-[#171717] text-[#171717] dark:text-[#F5F5F5] transition-colors duration-300">
    
    <header class="w-full py-4 px-6 shadow-sm bg-[#FFFFFF] dark:bg-[#262626] transition-colors duration-300">
        <div class="max-w-7xl mx-auto flex items-center justify-start">
            <h1 class="text-2xl font-bold text-[#7C3AED] dark:text-[#8B5CF6]">Rabta</h1>
        </div>
    </header>

    <main class="flex items-center justify-center px-4 py-16">
        <div class="w-full max-w-md">
            
            <div class="bg-[#FFFFFF] dark:bg-[#262626] rounded-3xl shadow-xl p-10 transition-colors duration-300 border border-gray-100 dark:border-gray-800">
                
                <div class="text-center mb-10">
                    <div class="w-20 h-20 mx-auto mb-6 rounded-2xl flex items-center justify-center bg-[#7C3AED] dark:bg-[#8B5CF6] shadow-lg rotate-3">
                        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-extrabold mb-3 tracking-tight">Welcome to Rabta</h2>
                    <p class="text-gray-500 dark:text-gray-400">The exclusive hub for ITI graduates and tech enthusiasts.</p>
                </div>

                <div class="space-y-4">
                    <a href="login.html" class="block w-full py-3.5 px-4 rounded-xl text-center text-white font-semibold transition-all hover:opacity-90 bg-[#7C3AED] dark:bg-[#8B5CF6] shadow-md hover:shadow-lg">
                        Log In
                    </a>
                    
                    <a href="signup.html" class="block w-full py-3.5 px-4 rounded-xl text-center font-semibold transition-all border-2 border-[#7C3AED] dark:border-[#8B5CF6] text-[#7C3AED] dark:text-[#8B5CF6] hover:bg-[#7C3AED] hover:text-white dark:hover:bg-[#8B5CF6] dark:hover:text-[#171717]">
                        Create Account
                    </a>
                </div>

                <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-8 leading-relaxed">
                    By continuing, you agree to our <br>
                    <a href="#" class="underline hover:text-[#7C3AED]">Terms of Service</a> and <a href="#" class="underline hover:text-[#7C3AED]">Privacy Policy</a>
                </p>
            </div>

        </div>
    </main>

</body>
</html>
