<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabta - Create Group Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function switchTab(tab) {
            const normalFields = document.getElementById('normal-fields');
            const jobFields = document.getElementById('job-fields');
            const normalTab = document.getElementById('normal-tab');
            const jobTab = document.getElementById('job-tab');
            const submitBtnText = document.getElementById('submit-btn-text');
            normalTab.classList.remove('border-b-2', 'border-[#7C3AED]', 'text-[#7C3AED]');
            jobTab.classList.remove('border-b-2', 'border-[#7C3AED]', 'text-[#7C3AED]');
            normalTab.classList.add('text-gray-400');
            jobTab.classList.add('text-gray-400');
            if (tab === 'job') {
                normalFields.classList.add('hidden');
                jobFields.classList.remove('hidden');
                jobTab.classList.add('border-b-2', 'border-[#7C3AED]', 'text-[#7C3AED]');
                jobTab.classList.remove('text-gray-400');
                submitBtnText.innerText = "Publish Job Opportunity";
            } else {
                jobFields.classList.add('hidden');
                normalFields.classList.remove('hidden');
                normalTab.classList.add('border-b-2', 'border-[#7C3AED]', 'text-[#7C3AED]');
                normalTab.classList.remove('text-gray-400');
                submitBtnText.innerText = "Post to Group";
            }
        }
    </script>
</head>

<body
    class="min-h-screen bg-[#FAFAFA] dark:bg-[#171717] text-[#171717] dark:text-[#F5F5F5] transition-colors duration-300 pb-10">

    <header
        class="w-full py-4 px-6 bg-white dark:bg-[#262626] border-b border-gray-100 dark:border-gray-800 sticky top-0 z-50 transition-colors">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <button onclick="history.back()"
                class="p-2 -ml-2 text-gray-500 hover:text-[#7C3AED] transition-colors rounded-full hover:bg-gray-50 dark:hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
            <h1 class="font-bold text-lg tracking-tight">Create Post</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 pt-6">
        <div
            class="flex bg-white dark:bg-[#262626] rounded-xl p-1 mb-8 shadow-sm border border-gray-100 dark:border-gray-800">
            <button id="normal-tab" onclick="switchTab('normal')"
                class="flex-1 py-2.5 text-sm font-bold rounded-lg border-b-2 border-[#7C3AED] text-[#7C3AED] dark:border-[#8B5CF6] dark:text-[#8B5CF6] transition-all">
                Post
            </button>

            <button id="job-tab" onclick="switchTab('job')"
                class="flex-1 py-2.5 text-sm font-bold rounded-lg text-gray-400 transition-all">
                Job
            </button>
        </div>

        <div
            class="bg-white dark:bg-[#262626] rounded-3xl p-6 md:p-8 shadow-sm border border-gray-100 dark:border-gray-800 transition-colors">

            <div class="mb-8 flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-full bg-[#7C3AED]/10 dark:bg-[#8B5CF6]/10 flex items-center justify-center text-[#7C3AED] dark:text-[#8B5CF6] font-bold text-xs">
                    ITI</div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none mb-1">Posting
                        to Community</p>
                    <p class="text-sm font-bold text-[#7C3AED] dark:text-[#8B5CF6]">ITI Intake 44 - Front-End</p>
                </div>
            </div>

            <form class="space-y-6">
                <div id="normal-fields" class="space-y-4">
                    <textarea placeholder="What's on your mind? Share news or updates..."
                        class="w-full min-h-[220px] bg-transparent text-lg outline-none resize-none placeholder-gray-300 dark:placeholder-gray-600"></textarea>

                    <div class="flex items-center gap-2 pt-4 border-t border-gray-50 dark:border-gray-800">
                        <button type="button"
                            class="p-3 rounded-xl bg-gray-50 dark:bg-[#171717] text-gray-500 hover:text-[#7C3AED] transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                </path>
                            </svg>
                        </button>
                        <button type="button"
                            class="p-3 rounded-xl bg-gray-50 dark:bg-[#171717] text-gray-500 hover:text-[#7C3AED] transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="job-fields" class="hidden space-y-5">
                    <div class="space-y-4">
                        <input type="text" placeholder="Job Title"
                            class="w-full bg-transparent border-b border-gray-100 dark:border-b-800 py-3 outline-none focus:border-[#7C3AED] transition-colors font-bold text-xl">

                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" placeholder="Company"
                                class="w-full bg-gray-50 dark:bg-[#171717] px-4 py-3 rounded-xl outline-none text-sm">
                            <input type="text" placeholder="Location"
                                class="w-full bg-gray-50 dark:bg-[#171717] px-4 py-3 rounded-xl outline-none text-sm">
                        </div>

                        <div
                            class="bg-[#7C3AED]/5 dark:bg-[#8B5CF6]/5 p-4 rounded-2xl border border-dashed border-[#7C3AED]/20">
                            <label
                                class="block text-[10px] font-bold text-[#7C3AED] dark:text-[#8B5CF6] uppercase mb-2">Application
                                Link</label>
                            <input type="url" placeholder="https://..."
                                class="w-full bg-transparent outline-none text-sm">
                        </div>

                        <textarea placeholder="Job description and requirements..."
                            class="w-full h-32 bg-transparent py-2 outline-none resize-none text-sm"></textarea>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="button"
                        class="group relative w-full bg-[#7C3AED] dark:bg-[#8B5CF6] text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-[#7C3AED]/20 dark:shadow-none hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 overflow-hidden">
                        <span id="submit-btn-text">Post to Group</span>
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
