<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabta | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        // ضبط الدارك مود تلقائياً بناءً على إعدادات اليوزر
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // إعدادات الأنيميشن الاحترافية لصفحة البداية
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { light: '#7C3AED', dark: '#8B5CF6' }
                    },
                    animation: {
                        'float': 'float 4s ease-in-out infinite',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'loading': 'loading 1.5s ease-in-out infinite'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.85)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        loading: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(200%)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center overflow-hidden bg-[#FAFAFA] dark:bg-[#171717] transition-colors duration-500 relative font-sans">

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#7C3AED]/10 dark:bg-[#8B5CF6]/15 rounded-full blur-[100px] animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#7C3AED]/10 dark:bg-[#8B5CF6]/15 rounded-full blur-[100px] animate-pulse" style="animation-delay: 1s;"></div>
    </div>

    <div class="flex flex-col items-center z-10 relative">
        
        <div class="relative animate-scale-in mb-8">
            <div class="absolute inset-0 bg-[#7C3AED] dark:bg-[#8B5CF6] blur-2xl opacity-40 rounded-[32px]"></div>
            
            <div class="relative w-28 h-28 bg-gradient-to-tr from-[#7C3AED] to-[#9F67FF] dark:from-[#8B5CF6] dark:to-[#A78BFA] rounded-[32px] flex items-center justify-center text-white shadow-2xl animate-float border border-white/20">
                <span class="material-icons-round text-[60px]">hub</span>
            </div>
        </div>

        <h1 class="text-5xl font-black text-[#171717] dark:text-[#F5F5F5] tracking-tight mb-3 animate-fade-in-up opacity-0" style="animation-delay: 0.2s;">
            Rabta
        </h1>
        
        <p class="text-xs font-bold uppercase tracking-[0.25em] text-gray-400 dark:text-gray-500 animate-fade-in-up opacity-0 mb-14" style="animation-delay: 0.4s;">
            Tech Community Hub
        </p>

        <div class="animate-fade-in-up opacity-0 flex flex-col items-center w-full" style="animation-delay: 0.6s;">
            <div class="w-48 h-1 bg-gray-200 dark:bg-white/10 rounded-full overflow-hidden relative">
                <div class="absolute top-0 bottom-0 w-1/2 bg-[#7C3AED] dark:bg-[#8B5CF6] rounded-full animate-loading"></div>
            </div>
            <p class="text-[11px] text-gray-400 dark:text-gray-500 mt-4 font-medium animate-pulse">
                Syncing with ITI network...
            </p>
        </div>

    </div>

    <div class="absolute bottom-8 text-center animate-fade-in-up opacity-0 z-10" style="animation-delay: 0.8s;">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">Version 1.0.0</p>
    </div>

    <script>
        // هنا بنخلي الصفحة تنقل لصفحة الهوم بعد 3.5 ثانية
            // التوجيه لصفحة تسجيل الدخول بعد 3.5 ثانية
        setTimeout(() => {
            window.location.href = 'home.html'; 
        }, 3500);
            console.log("Redirecting to the main app...");
    </script>
</body>
</html>
